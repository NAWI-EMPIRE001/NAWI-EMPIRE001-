<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIAL SHOP | NAWI EMPIRE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        
        /* --- HEADER --- */
        .shop-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #111; background: linear-gradient(to bottom, #0c0c0c, var(--black)); }
        .shop-header h1 { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin: 0; }
        .balance-pill { display: inline-block; background: var(--glass); border: 1px solid #222; padding: 8px 15px; border-radius: 20px; font-size: 11px; margin-top: 15px; color: var(--gold); font-weight: 800; }

        /* --- CATEGORY BAR --- */
        .category-scroll { display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--dark); border: 1px solid #1a1a1a; color: #666; padding: 10px 20px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* --- PRODUCT GRID --- */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .product-card { background: var(--dark); border-radius: 20px; border: 1px solid #111; overflow: hidden; position: relative; animation: fadeInUp 0.5s ease forwards; }
        .product-img { width: 100%; height: 140px; object-fit: cover; border-bottom: 1px solid #111; }
        .product-info { padding: 12px; }
        .product-name { font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #eee; }
        .product-origin { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .product-price { font-size: 13px; color: var(--gold); font-weight: 900; margin: 10px 0; }
        
        .btn-buy { width: 100%; background: var(--gold); color: black; border: none; padding: 10px; border-radius: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase; cursor: pointer; }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #111; }
        .nav-item { color: #444; font-size: 18px; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="shop-header">
        <h1>Imperial Kitchen</h1>
        <div class="balance-pill" id="user-balance">0.00 🪙 Empire Coins</div>
    </div>

    <div class="category-scroll">
        <button class="cat-btn active" onclick="filterShop('All')">All Assets</button>
        <button class="cat-btn" onclick="filterShop('Raw Food')">Raw Food</button>
        <button class="cat-btn" onclick="filterShop('Cooked Meal')">Cooked Meals</button>
        <button class="cat-btn" onclick="filterShop('Spices')">Spices</button>
        <button class="cat-btn" onclick="filterShop('International')">International</button>
    </div>

    <div class="product-grid" id="market-container">
        <p style="grid-column: span 2; text-align: center; color: #333; font-size: 10px; padding: 40px;">Synchronizing with the Vault...</p>
    </div>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="shop.html" class="nav-item active"><i class="fa-solid fa-basket-shopping"></i></a>
        <a href="vendor.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-shield"></i></a>
    </nav>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";
        let allProducts = [];

        // 1. FETCH APPROVED MEALS FROM VAULT
        async function fetchShopData() {
            try {
                const res = await fetch(`${API_URL}/api/get-products`);
                const products = await res.json();
                
                // Only show products you have APPROVED in HQ
                allProducts = products.filter(p => p.status === 'APPROVED');
                renderProducts(allProducts);
            } catch (err) {
                console.error("Vault Connection Error");
            }
        }

        // 2. RENDER PRODUCTS TO GRID
        function renderProducts(list) {
            const container = document.getElementById('market-container');
            if(list.length === 0) {
                container.innerHTML = '<p style="grid-column: span 2; text-align: center; color: #444; font-size: 10px;">The Kitchen is currently being restocked.</p>';
                return;
            }

            container.innerHTML = list.map(item => `
                <div class="product-card">
                    <img src="${item.images[0] || 'https://via.placeholder.com/300x200'}" class="product-img" alt="meal">
                    <div class="product-info">
                        <div class="product-origin">${item.origin}</div>
                        <div class="product-name">${item.mealName}</div>
                        <div class="product-price">${item.price} 🪙</div>
                        <button class="btn-buy" onclick="initiatePurchase('${item._id}')">Acquire</button>
                    </div>
                </div>
            `).join('');
        }

        // 3. FILTER LOGIC
        function filterShop(category) {
            // Update UI buttons
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === category || (category === 'All' && btn.innerText === 'All Assets')) {
                    btn.classList.add('active');
                }
            });

            if(category === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === category);
                renderProducts(filtered);
            }
        }

        // 4. PURCHASE LOGIC
        function initiatePurchase(productId) {
            alert("SECURE HANDSHAKE INITIATED: Contacting Founder for transaction clearance.");
            // Here you would link to a checkout or a chat with the seller
        }

        // Initialize Shop
        window.onload = fetchShopData;
    </script>
</body>
</html>
