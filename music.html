<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Music & Promotion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #111; --black: #000; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--black); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px 20px 100px; }
        
        /* PREMIUM HEADER */
        .header { text-align: center; margin: 20px 0 40px; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 4px; font-size: 26px; font-weight: 900; }
        .header p { color: #666; font-size: 12px; letter-spacing: 1px; margin-top: 8px; text-transform: uppercase; }

        /* PROMOTION CARD (LUXURY STYLE) */
        .promo-card { 
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid var(--gold); 
            padding: 30px 20px; 
            border-radius: 20px; 
            margin-bottom: 40px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        .promo-card h2 { color: var(--gold); margin: 0 0 10px; font-size: 20px; }
        .promo-card p { color: #aaa; font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
        
        .btn-promote { 
            display: inline-block;
            background: var(--gold); 
            color: #000; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-weight: 900; 
            text-decoration: none; 
            font-size: 13px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* MUSIC FEED */
        .feed-title { font-size: 12px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 900; }
        .track-list { display: grid; gap: 12px; }
        .track-item { 
            background: var(--glass); 
            border: 1px solid #222; 
            padding: 15px; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            transition: 0.3s;
        }
        .track-item:hover { background: #1a1a1a; border-color: var(--gold); }
        
        .track-main { display: flex; align-items: center; gap: 15px; }
        .play-ring { 
            width: 45px; height: 45px; 
            border: 1px solid var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: var(--gold);
            cursor: pointer;
            transition: 0.3s;
        }
        .play-ring:hover { background: var(--gold); color: black; }
        
        .track-info { display: flex; flex-direction: column; }
        .track-name { font-weight: 700; font-size: 15px; color: #fff; }
        .artist-name { font-size: 12px; color: #666; margin-top: 3px; }

        /* EARNING BADGE */
        .earn-tag { 
            background: rgba(212, 175, 55, 0.1); 
            color: var(--gold); 
            padding: 6px 12px; 
            border-radius: 30px; 
            font-size: 11px; 
            font-weight: 900; 
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* MASTER NAVIGATION */
        .master-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-box { text-align: center; cursor: pointer; color: #555; text-decoration: none; }
        .nav-box p { font-size: 10px; margin: 5px 0 0; font-weight: bold; }
        .active-tab { color: var(--gold) !important; }
        .plus-btn { background: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -10px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎵 MUSIC HUB</h1>
        <p>Listen to Earn • Pay to Grow</p>
    </div>

    <div class="promo-card">
        <h2>Boost Your Track</h2>
        <p>Reach 10,000 verified listeners and grow your fanbase across the Empire.</p>
        <a href="inbox.html" class="btn-promote">Promote for 10 Coins 🪙</a>
    </div>

    <div class="feed-title">Trending in the Empire</div>

    <div class="track-list">
        <div class="track-item">
            <div class="track-main">
                <div class="play-ring" onclick="handlePlay('Anthem')">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="track-info">
                    <span class="track-name">Empire Anthem (Remix)</span>
                    <span class="artist-name">Empire studio</span>
                </div>
            </div>
            <div class="earn-tag">+2 Coins</div>
        </div>

        <div class="track-item">
            <div class="track-main">
                <div class="play-ring" onclick="handlePlay('Naira Dreams')">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="track-info">
                    <span class="track-name">Naira Dreams</span>
                    <span class="artist-name">7 Pillars Studio</span>
                </div>
            </div>
            <div class="earn-tag">+2 Coins</div>
        </div>
    </div>

    <nav class="master-nav">
        <a href="index.html" class="nav-box"><i class="fa-solid fa-house" style="font-size: 20px;"></i><p>Home</p></a>
        <a href="discover.html" class="nav-box"><i class="fa-solid fa-compass" style="font-size: 20px;"></i><p>Discover</p></a>
        <div onclick="window.location.href='app-grid.html'" class="nav-box">
            <div class="plus-btn"><i class="fa-solid fa-plus" style="font-size: 20px; color: black;"></i></div>
        </div>
        <a href="inbox.html" class="nav-box"><i class="fa-solid fa-message" style="font-size: 20px;"></i><p>Inbox</p></a>
        <a href="profile.html" class="nav-box"><i class="fa-solid fa-user" style="font-size: 20px;"></i><p>Profile</p></a>
    </nav>

    <script>
        function handlePlay(track) {
            console.log("Streaming: " + track);
            // This button works! It can trigger your music player later.
        }
    </script>

</body>
</html>
