<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE | 7 PILLARS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --neon: #00ff41; }
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-user-select: none; /* Prevents text selection during long-press */
        }

        /* --- THE DYNAMIC GRID --- */
        .app-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .app-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .app-card i { font-size: 28px; color: var(--gold); }
        .app-card span { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #666; }
        .app-card:active { transform: scale(0.95); border-color: var(--gold); }

        /* --- MASTER THEME OVERRIDE --- */
        .master-mode .app-card { border-color: var(--neon); }
        .master-mode .app-card i { color: var(--neon); text-shadow: 0 0 10px rgba(0,255,65,0.3); }
        .master-mode #node7 { background: var(--neon) !important; box-shadow: 0 0 30px var(--neon); }

        /* --- MASTER AUTH OVERLAY --- */
        #masterAuth {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }
        #masterAuth input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--neon);
            color: var(--neon);
            font-size: 32px;
            text-align: center;
            width: 150px;
            letter-spacing: 15px;
            outline: none;
            margin: 20px 0;
        }

        /* --- NAVIGATION --- */
        .node-7-wrapper { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .main-node {
            width: 70px; height: 70px; background: white; color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            font-weight: 900; border: 5px solid var(--black); transition: 0.5s;
        }

        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.95);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px;
            border-top: 1px solid #111; z-index: 900;
        }
        .nav-link { color: #333; font-size: 22px; transition: 0.3s; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body id="mainBody">

    <div id="masterAuth">
        <i class="fa-solid fa-user-shield text-[#00ff41] text-5xl mb-4"></i>
        <p class="text-[#00ff41] text-[10px] font-black tracking-widest uppercase">Identity Verification Required</p>
        <input type="password" id="passCode" maxlength="4" placeholder="••••">
        <button onclick="verifyAccess()" class="bg-[#00ff41] text-black px-8 py-3 rounded-full font-black text-[10px] uppercase">Authorize</button>
        <p onclick="closeAuth()" class="mt-8 text-zinc-600 text-[8px] font-bold uppercase">Abort Session</p>
    </div>

    <div class="p-6 pt-10 flex justify-between items-center">
        <div>
            <p id="realm-label" class="text-[8px] font-black tracking-[0.4em] text-zinc-600 uppercase">Citizen Realm</p>
            <h1 id="greeting" class="text-xl font-black italic">NAWI HUB</h1>
        </div>
        <div class="flex flex-col items-end">
            <div id="status-light" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
            <span class="text-[6px] text-zinc-800 font-bold mt-1">NODE 001</span>
        </div>
    </div>

    <div class="app-container">
        <div class="app-card" onclick="location.href='market.html'">
            <i class="fa-solid fa-store"></i>
            <span>Market</span>
        </div>
        <div class="app-card" onclick="location.href='kitchen.html'">
            <i class="fa-solid fa-utensils"></i>
            <span>Kitchen</span>
        </div>
        <div class="app-card" onclick="location.href='studio.html'">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Studio</span>
        </div>
        <div class="app-card" onclick="location.href='messages.html'">
            <i class="fa-solid fa-inbox"></i>
            <span>Inbox</span>
        </div>
    </div>

    <div id="imperialSection" class="px-6 hidden mt-4 animate-pulse">
        <div class="border-t border-zinc-900 pt-6 mb-4">
            <h3 class="text-[9px] font-black text-[#00ff41] tracking-[0.4em] uppercase">Sovereign Control</h3>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="app-card border-dotted border-green-900" onclick="location.href='sys-log-cache-82.html'">
                <i class="fa-solid fa-microchip !text-[#00ff41]"></i>
                <span class="!text-zinc-500">Command Suite</span>
            </div>
            <div class="app-card border-dotted border-green-900" onclick="location.href='admin-vault.html'">
                <i class="fa-solid fa-vault !text-[#00ff41]"></i>
                <span class="!text-zinc-500">Global Reserve</span>
            </div>
        </div>
        <button onclick="lockMaster()" class="w-full mt-6 py-3 border border-zinc-900 rounded-xl text-[8px] font-black text-zinc-700 uppercase">Seal Session</button>
    </div>

    <div class="node-7-wrapper">
        <div class="main-node" id="node7" onclick="handle7Node()">7</div>
    </div>

    <nav class="bottom-bar">
        <a href="index.html" class="nav-link active"><i class="fa-solid fa-house"></i></a>
        <a href="market.html" class="nav-link"><i class="fa-solid fa-gem"></i></a>
        <div style="width: 70px;"></div>
        <a href="messages.html" class="nav-link"><i class="fa-solid fa-message"></i></a>
        <div id="profileTrigger" class="nav-link"><i class="fa-solid fa-circle-user"></i></div>
    </nav>

    <script>
        let pressTimer;
        const secretCode = "0001"; // Your Master Password

        // 1. Long Press Logic on Profile
        const trigger = document.getElementById('profileTrigger');
        trigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                if (window.navigator.vibrate) window.navigator.vibrate(100);
                document.getElementById('masterAuth').style.display = 'flex';
            }, 4000); // 4 Seconds to trigger
        });
        trigger.addEventListener('touchend', () => clearTimeout(pressTimer));

        // 2. Verification Logic
        function verifyAccess() {
            const input = document.getElementById('passCode').value;
            if (input === secretCode) {
                unlockMaster();
            } else {
                alert("ACCESS DENIED");
                closeAuth();
            }
        }

        function unlockMaster() {
            document.getElementById('masterAuth').style.display = 'none';
            document.getElementById('mainBody').classList.add('master-mode');
            document.getElementById('imperialSection').classList.remove('hidden');
            document.getElementById('realm-label').innerText = "Imperial Command Center";
            document.getElementById('realm-label').style.color = "#00ff41";
            document.getElementById('status-light').classList.replace('bg-amber-500', 'bg-[#00ff41]');
            document.getElementById('greeting').innerText = "WELCOME FOUNDER";
            localStorage.setItem('session_type', 'MASTER');
        }

        function lockMaster() {
            localStorage.removeItem('session_type');
            location.reload();
        }

        function closeAuth() {
            document.getElementById('masterAuth').style.display = 'none';
            document.getElementById('passCode').value = '';
        }

        function handle7Node() {
            if (localStorage.getItem('session_type') === 'MASTER') {
                location.href = 'sys-log-cache-82.html';
            } else {
                const node = document.getElementById('node7');
                node.style.transform = "rotate(360deg) scale(1.1)";
                setTimeout(() => node.style.transform = "rotate(0) scale(1)", 500);
            }
        }

        // On Load Check
        window.onload = () => {
            if(localStorage.getItem('session_type') === 'MASTER') unlockMaster();
        };
    </script>
</body>
</html>
