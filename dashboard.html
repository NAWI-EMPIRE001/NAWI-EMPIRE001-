<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXECUTIVE DASHBOARD | NAWI-EMPIRE</title>
    
    <!-- Unified Branding & Authority -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root { --gold: #D4AF37; --black: #050505; --matte: #0A0A0A; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; }
        
        /* Technical Luxury Glass */
        .glass-card { 
            background: rgba(20, 20, 20, 0.6); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            backdrop-filter: blur(15px); 
            border-radius: 20px;
        }

        .pillar-nav-fixed {
            position: fixed; left: 0; top: 0; height: 100vh; width: 70px;
            background: var(--matte); border-right: 1px solid var(--gold);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100;
        }

        .pillar-icon {
            width: 45px; height: 45px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #222; border-radius: 10px; color: #555;
            transition: 0.3s; cursor: pointer;
        }

        .pillar-icon.unlocked { color: var(--gold); border-color: var(--gold); }
        .pillar-icon:hover { background: rgba(212, 175, 55, 0.1); }

        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        
        /* Scrolling Ledger */
        .ledger-container { max-height: 300px; overflow-y: auto; scrollbar-width: none; }
        .ledger-row { border-bottom: 1px solid #1a1a1a; padding: 12px 0; font-size: 11px; }
    </style>
</head>
<body class="pl-[80px] pr-6 pt-6 pb-28">

    <!-- 1. SOVEREIGN HEADER -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 id="username" class="text-xl font-black tracking-tighter uppercase">Initializing Node...</h1>
            <div class="flex items-center gap-2 mt-1">
                <span id="citizen-level" class="text-amber-500 text-[9px] font-black tracking-widest uppercase">Level 0 • RECRUIT</span>
                <i class="fa-solid fa-circle-check text-blue-500 text-[10px] hidden" id="v-badge"></i>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">Vault Reserve: $35M</p>
            <h2 id="coin-balance" class="text-xl font-black text-amber-500">0.00 EMPR</h2>
        </div>
    </div>

    <!-- 2. PILLAR 1 UNLOCK PROGRESS -->
    <div class="glass-card p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Pillar 1: Market Authorization</h3>
            <span id="post-stats" class="text-amber-500 font-black text-[10px]">0 / 3 ASSETS</span>
        </div>
        <div class="w-full h-1.5 bg-zinc-900 rounded-full overflow-hidden mb-3">
            <div id="level-progress" class="bg-amber-500 h-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <p id="requirement-text" class="text-[9px] text-zinc-500 italic">
            *Post 3 high-end renders to unlock P2P Escrow & Market access.
        </p>
    </div>

    <!-- 3. THE 7 PILLAR SIDE NAVIGATION -->
    <nav class="pillar-nav-fixed hidden md:flex">
        <div class="mini-seal mb-6">👑</div>
        <div class="pillar-icon unlocked" title="General Feed"><i class="fa-solid fa-house"></i></div>
        <div class="pillar-icon" id="p-market" title="Marketplace"><i class="fa-solid fa-shop"></i></div>
        <div class="pillar-icon unlocked" id="p-ads" title="Ads Manager"><i class="fa-solid fa-rectangle-ad"></i></div>
        <div class="pillar-icon unlocked" id="p-studio" title="Studio"><i class="fa-solid fa-microphone-lines"></i></div>
        <div class="pillar-icon unlocked" id="p-live" title="Live Stream"><i class="fa-solid fa-video"></i></div>
        <div class="pillar-icon unlocked" id="p-kitchen" title="Kitchen"><i class="fa-solid fa-utensils"></i></div>
        <div class="pillar-icon unlocked" id="p-stylist" title="Sovereign Stylist"><i class="fa-solid fa-shirt"></i></div>
    </nav>

    <!-- 4. EXECUTIVE STATS GRID -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-5">
            <p class="text-[8px] text-zinc-500 uppercase font-black mb-2">Active Ads</p>
            <h4 class="text-2xl font-light" id="active-ads">0</h4>
        </div>
        <div class="glass-card p-5">
            <p class="text-[8px] text-zinc-500 uppercase font-black mb-2">Style Assets</p>
            <h4 class="text-2xl font-light" id="stylist-assets">0</h4>
        </div>
    </div>

    <!-- 5. THE UNIVERSAL LEDGER (P2P ESCROW) -->
    <div class="glass-card p-6">
        <h3 class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-4">Imperial Ledger</h3>
        <div class="ledger-container" id="ledger-body">
            <p class="text-[10px] text-zinc-600 text-center py-10">No recent transactions in the Sovereign Node.</p>
        </div>
    </div>

    <!-- 6. MOBILE NAVIGATION HUB -->
    <nav class="fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-lg border-t border-zinc-900 flex justify-around p-5 z-50">
        <a href="index.html" class="text-zinc-600"><i class="fa-solid fa-house-chimney text-xl"></i></a>
        <a href="create-post.html" class="plus-btn transform -translate-y-8 bg-amber-500 w-12 h-12 rounded-full flex items-center justify-center text-black border-4 border-black"><i class="fa-solid fa-plus"></i></a>
        <a href="dashboard.html" class="text-amber-500"><i class="fa-solid fa-chart-pie text-xl"></i></a>
    </nav>

    <!-- LOGIC INTEGRATION -->
    <script src="nawi_empire_v1.js"></script>
    <script>
        const API_URL = "https://nawi-empire1.onrender.com";
        const currentUserID = localStorage.getItem('user-id') || 'NAWI-EMPIRE001';

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/api/get-profile`, {
                    headers: { 'user-id': currentUserID }
                });
                const data = await response.json();

                if(data) {
                    document.getElementById('username').innerText = data.username || "Citizen Node";
                    document.getElementById('coin-balance').innerText = `${(data.walletBalance || 0).toFixed(2)} EMPR`;
                    
                    const postCount = data.posts ? data.posts.length : 0;
                    document.getElementById('post-stats').innerText = `${postCount} / 3 ASSETS`;
                    
                    const progress = Math.min((postCount / 3) * 100, 100);
                    document.getElementById('level-progress').style.width = progress + "%";

                    // AUTHORITY OVERRIDE: Unlock everything for the CEO
                    if(postCount >= 3 || currentUserID === "NAWI-EMPIRE001") {
                        document.getElementById('p-market').classList.add('unlocked');
                        document.getElementById('citizen-level').innerText = "Level 1 • AUTHORIZED CITIZEN";
                        document.getElementById('requirement-text').innerText = "✅ PILLAR ACCESS GRANTED.";
                    }

                    if(currentUserID === "NAWI-EMPIRE001") {
                        document.getElementById('v-badge').classList.remove('hidden');
                        document.getElementById('citizen-level').innerText = "SYSTEM FOUNDER • NODE 001";
                    }
                }
            } catch (err) {
                console.warn("Vault Syncing...");
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
