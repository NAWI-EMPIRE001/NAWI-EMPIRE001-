<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Join the 7 Pillars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #000; --dark: #0a0a0a; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        
        .reg-container { max-width: 400px; margin: 0 auto; text-align: center; }
        .logo-area { margin-bottom: 30px; }
        .logo-area h1 { color: var(--gold); letter-spacing: 5px; font-weight: 900; margin: 0; font-size: 22px; }
        .logo-area p { font-size: 10px; color: #555; text-transform: uppercase; margin-top: 10px; }

        .form-card { background: var(--dark); padding: 30px; border-radius: 25px; border: 1px solid #1a1a1a; text-align: left; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 8px; }
        
        .input-box { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; }
        .input-box:focus { border-color: var(--gold); outline: none; }

        .check-group { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 25px; }
        .check-group input { margin-top: 3px; accent-color: var(--gold); }
        .check-group p { font-size: 11px; color: #666; margin: 0; line-height: 1.4; }

        .btn-register { width: 100%; background: var(--gold); color: #000; padding: 18px; border-radius: 15px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-register:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <div class="reg-container">
        <div class="logo-area">
            <h1>NAWI-EMPIRE</h1>
            <p>Founder Onboarding Protocol</p>
        </div>

        <div class="form-card">
            <form action="profile.html">
                <label>Full Name</label>
                <input type="text" class="input-box" placeholder="Enter your name" required>

                <label>Empire Username</label>
                <input type="text" class="input-box" placeholder="@username" required>

                <label>Business Email</label>
                <input type="email" class="input-box" placeholder="email@example.com" required>

                <div class="check-group">
                    <input type="checkbox" required>
                    <p>I agree to follow the rules of the platform and respect the authority of the 7 Pillars.</p>
                </div>

                <button type="submit" class="btn-register">Activate My Status</button>
            </form>
        </div>
        
        <p style="font-size: 11px; color: #444; margin-top: 20px;">Already a Founder? <a href="admin-login.html" style="color: var(--gold); text-decoration: none;">Login here</a></p>
    </div>

</body>
</html>
