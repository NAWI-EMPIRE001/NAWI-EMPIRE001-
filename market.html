<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI Marketplace</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; }
        .item-card { background: #1a1a1a; border: 1px solid #ffd700; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .price { color: #ffd700; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🛒 EMPIRE MARKET</h2>
    <div class="item-card">
        <h3>Premium Logo Design</h3>
        <p>Custom 3D Luxury Branding</p>
        <div class="price">₦25,000</div>
        <button style="width:100%; margin-top:10px; padding:10px; background:#ffd700; border:none; font-weight:bold;">BUY NOW</button>
    </div>
</body>
</html>
