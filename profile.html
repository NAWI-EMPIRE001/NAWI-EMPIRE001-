<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | MASTER IDENTITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --neon: #00ff41; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; transition: 0.5s; }
        
        /* THE TOGGLE SWITCH */
        .mode-switcher { padding: 20px; text-align: right; }
        .switch-btn { background: #1a1a1a; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 900; }

        /* NORMAL PROFILE STYLE */
        .profile-view { display: block; text-align: center; padding: 20px; }
        .lux-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #222, #000); }
        .lux-img i { font-size: 40px; color: var(--gold); }

        /* CONTROL ROOM STYLE (Hidden by default) */
        .control-room { display: none; padding: 20px; background: #000; height: 100vh; font-family: 'Courier New', monospace; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .monitor-box { background: #050505; border: 1px solid #1a1a1a; padding: 15px; border-radius: 5px; }
        .monitor-box label { color: var(--neon); font-size: 9px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .monitor-box span { font-size: 16px; color: #fff; font-weight: bold; }
        .active-pulse { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--neon); }

        /* NAVIGATION BAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #444; font-size: 20px; cursor: pointer; }
        .active-nav { color: var(--gold); }
    </style>
</head>
<body>

    <div class="mode-switcher">
        <button class="switch-btn" onclick="toggleMode()">Switch to Control Room</button>
    </div>

    <div id="profileView" class="profile-view">
        <div class="lux-img"><i class="fa-solid fa-crown"></i></div>
        <h2 style="margin: 15px 0 5px;">7 PILLARS</h2>
        <p style="color: #666; font-size: 12px;">The Only Son of His Parents | Founder</p>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
            <div><strong>1.2M</strong><br><small style="color:#444">Followers</small></div>
            <div><strong>0</strong><br><small style="color:#444">Following</small></div>
        </div>
    </div>

    <div id="controlRoom" class="control-room">
        <h3 style="color: var(--neon); font-size: 12px;"><i class="fa-solid fa-terminal"></i> SYSTEM COMMAND CENTER</h3>
        <p style="font-size: 10px; color: #444;">Access Level: Sovereign | Founder Identity Hidden</p>
        
        <div class="stat-grid">
            <div class="monitor-box">
                <label><div class="active-pulse"></div> Live Users</label>
                <span>4,102</span>
            </div>
            <div class="monitor-box">
                <label>Platform Revenue</label>
                <span>$35.0M</span>
            </div>
            <div class="monitor-box">
                <label>Coin Circulation</label>
                <span>999K+ 🪙</span>
            </div>
            <div class="monitor-box" onclick="location.href='app-grid.html'">
                <label style="color: var(--gold);">Open 7 Pillars</label>
                <span style="font-size: 12px;">ENTER PORTAL →</span>
            </div>
        </div>
        
        <div style="margin-top: 30px; border: 1px solid #1a1a1a; padding: 10px; border-radius: 5px;">
            <label style="color: #444; font-size: 9px;">DATABASE LOGS</label>
            <marquee style="color: var(--neon); font-size: 11px;">[SUCCESS] Render linked to MongoDB Atlas... [ACTIVE] 7 Pillars Protocol Running... [SAFE] Identity Encrypted...</marquee>
        </div>
    </div>

    <div class="bottom-nav">
        <i class="fa-solid fa-home nav-item" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-compass nav-item"></i>
        <i class="fa-solid fa-plus-circle nav-item" style="color: var(--gold); font-size: 30px;" onclick="location.href='app-grid.html'"></i>
        <i class="fa-solid fa-message nav-item"></i>
        <i class="fa-solid fa-user nav-item active-nav"></i>
    </div>

    <script>
        function toggleMode() {
            var profile = document.getElementById("profileView");
            var room = document.getElementById("controlRoom");
            var btn = document.querySelector(".switch-btn");

            if (profile.style.display === "none") {
                profile.style.display = "block";
                room.style.display = "none";
                btn.innerText = "Switch to Control Room";
                document.body.style.background = "#000";
            } else {
                profile.style.display = "none";
                room.style.display = "block";
                btn.innerText = "Back to Luxury View";
                document.body.style.background = "#050505";
            }
        }
    </script>
</body>
</html>
