<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | FOUNDER PROFILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #111; --black: #000; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; text-align: center; padding-bottom: 50px; }
        
        /* Top Navigation */
        .top-bar { display: flex; justify-content: space-between; padding: 40px 20px 20px; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .top-bar i { font-size: 18px; color: var(--gold); }

        /* Profile Header */
        .header-section { padding: 30px 0; background: linear-gradient(to bottom, #0a0a0a, #000); }
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid var(--gold); margin: 0 auto 15px;
            background: #222; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .profile-img i { font-size: 50px; color: var(--gold); }

        .founder-name { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .badge { font-size: 10px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        /* Authority Stats (The Numbers You Control) */
        .stats-container { display: flex; justify-content: space-around; padding: 20px; margin: 20px 15px; background: var(--dark); border-radius: 15px; border: 1px solid #222; }
        .stat-box { text-align: center; }
        .stat-box span { display: block; font-size: 18px; font-weight: bold; color: var(--gold); }
        .stat-box label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 5px; display: block; }

        /* Actions */
        .action-row { display: flex; gap: 10px; padding: 0 20px; }
        .btn-edit { flex: 1; border: 1px solid #333; background: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .btn-control { flex: 1; background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; }

        /* Founder Info Section */
        .info-card { text-align: left; padding: 25px 20px; border-top: 1px solid #1a1a1a; margin-top: 20px; }
        .info-card h3 { font-size: 14px; color: var(--gold); margin-bottom: 10px; }
        .info-card p { font-size: 13px; color: #aaa; line-height: 1.6; }

        .back-nav { display: block; margin-top: 30px; color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fa-solid fa-shield-halved"></i>
        <strong style="letter-spacing: 2px; font-size: 14px;">COMMAND CENTER</strong>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="header-section">
        <div class="profile-img">
            <i class="fa-solid fa-crown"></i>
        </div>
        <div class="founder-name">7 PILLARS <span class="badge">FOUNDER</span></div>
        <p style="color: #666; font-size: 12px; margin-top: 5px;">@nawi-empire | Authority 001</p>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span>$35.0M</span>
            <label>Net Worth</label>
        </div>
        <div class="stat-box">
            <span>999K+</span>
            <label>Total Coins 🪙</label>
        </div>
        <div class="stat-box">
            <span>Level 10</span>
            <label>Founder Rank</label>
        </div>
    </div>

    <div class="action-row">
        <button class="btn-edit">Edit Platform</button>
        <button class="btn-control" onclick="location.href='app-grid.html'">Control Panel</button>
    </div>

    <div class="info-card">
        <h3>Official Bio</h3>
        <p>This is the official identity of the NAWI-EMPIRE Creator. 7 Pillars represents the foundation of digital wealth, creative design, and secure commerce.</p>
    </div>

    <a href="app-grid.html" class="back-nav">← Back to Headquarters</a>

</body>
</html>
