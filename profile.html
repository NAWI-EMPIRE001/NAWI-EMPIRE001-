<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | MASTER IDENTITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #000; --neon-green: #00ff41; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; transition: 0.4s; }
        
        /* TOP HEADER */
        .header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; }
        .switch-btn { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 6px 14px; border-radius: 4px; font-size: 10px; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }

        /* VIEW 1: NORMAL LUXURY PROFILE */
        #normalView { text-align: center; padding-top: 40px; display: block; }
        .lux-circle { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .lux-circle i { font-size: 45px; color: var(--gold); }
        .stat-row { display: flex; justify-content: center; gap: 35px; margin-top: 25px; }
        .stat-row div { text-align: center; }
        .stat-row strong { display: block; font-size: 18px; }
        .stat-row small { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* VIEW 2: MASTER COMMAND CENTER (Hidden) */
        #masterView { display: none; padding: 20px; }
        .command-title { color: var(--neon-green); font-family: 'Courier New', monospace; font-size: 13px; margin-bottom: 20px; display: block; }
        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .monitor-card { background: #080808; border: 1px solid #1a1a1a; padding: 15px; border-radius: 6px; }
        .monitor-card label { color: #444; font-size: 9px; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .monitor-card span { font-size: 16px; font-weight: bold; color: var(--gold); }
        .pulse { width: 7px; height: 7px; background: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px var(--neon-green); }

        /* BOTTOM NAVIGATION */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 18px 0; z-index: 100; }
        .nav-icon { color: #333; font-size: 22px; cursor: pointer; }
        .nav-active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-shield-halved" style="color: var(--gold);"></i>
        <button class="switch-btn" onclick="toggleMode()">Master Command</button>
        <i class="fa-solid fa-sliders" style="color: #222;"></i>
    </div>

    <div id="normalView">
        <div class="lux-circle"><i class="fa-solid fa-crown"></i></div>
        <h2 style="letter-spacing: 2px; margin: 0;">NAWI FOUNDER 001</h2>
        <p style="color: #444; font-size: 11px; margin: 5px 0;">Chief Authority Verified</p>
        
        <div class="stat-row">
            <div><strong>1.2M</strong><small>Followers</small></div>
            <div><strong>0</strong><small>Following</small></div>
            <div><strong>0</strong><small>Likes</small></div>
        </div>
    </div>

    <div id="masterView">
        <span class="command-title">> SOVEREIGN ACCESS GRANTED</span>
        <div class="monitor-grid">
            <div class="monitor-card">
                <label><div class="pulse"></div> System Nodes</label>
                <span>4,102 Active</span>
            </div>
            <div class="monitor-card">
                <label>Total Reserves</label>
                <span>$35.0M</span>
            </div>
            <div class="monitor-card">
                <label>Platform Coins</label>
                <span>999K+ 🪙</span>
            </div>
            <div class="monitor-card" onclick="location.href='app-grid.html'" style="border-color: var(--gold);">
                <label style="color: var(--gold);">Core Management</label>
                <span style="font-size: 12px;">7 PILLARS →</span>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fa-solid fa-house nav-icon" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-compass nav-icon"></i>
        <i class="fa-solid fa-circle-plus nav-icon" style="font-size: 32px;" onclick="location.href='app-grid.html'"></i>
        <i class="fa-solid fa-message nav-icon"></i>
        <i class="fa-solid fa-user nav-icon nav-active"></i>
    </div>

    <script>
        function toggleMode() {
            const v1 = document.getElementById('normalView');
            const v2 = document.getElementById('masterView');
            const btn = document.querySelector('.switch-btn');
            
            if (v1.style.display === "none") {
                v1.style.display = "block";
                v2.style.display = "none";
                btn.innerText = "Master Command";
                document.body.style.background = "#000";
            } else {
                v1.style.display = "none";
                v2.style.display = "block";
                btn.innerText = "Exit Command";
                document.body.style.background = "#050505";
            }
        }
    </script>
</body>
</html>
