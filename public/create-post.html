<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE | Create Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .upload-box {
            border: 2px dashed #222;
            border-radius: 30px;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            overflow: hidden;
            position: relative;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .glass-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            color: white;
            outline: none;
            font-size: 13px;
        }

        .publish-btn {
            background: var(--gold);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="p-6 flex justify-between items-center border-b border-zinc-900">
        <button onclick="history.back()" class="text-zinc-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
        <h1 class="text-[10px] font-black tracking-[0.4em] uppercase">New Transmission</h1>
        <div class="w-6"></div> </div>

    <div class="p-6">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt" class="text-center">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-zinc-700 mb-4"></i>
                <p class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">Select Graphic / Photo</p>
            </div>
            <img id="preview" class="preview-img">
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="previewFile()">

        <div class="mt-8 space-y-4">
            <p class="text-[8px] font-black text-zinc-600 uppercase tracking-widest px-2">Empire Description</p>
            <textarea id="postCaption" class="glass-input h-32" placeholder="Write your transmission..."></textarea>
        </div>

        <button class="publish-btn" onclick="publishPost()">Broadcast to Empire</button>
    </div>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";

        function previewFile() {
            const preview = document.getElementById('preview');
            const prompt = document.getElementById('uploadPrompt');
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = 'block';
                prompt.style.display = 'none';
            }

            if (file) { reader.readAsDataURL(file); }
        }

        async function publishPost() {
            const citizen = JSON.parse(localStorage.getItem('NAWI_USER'));
            const caption = document.getElementById('postCaption').value;
            const file = document.getElementById('fileInput').files[0];

            if (!file || !caption) {
                alert("Image and Caption required for the Empire Feed.");
                return;
            }

            // Convert image to Base64 for MongoDB (Simple version)
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const postData = {
                    author: citizen ? citizen.name : "Anonymous Citizen",
                    email: citizen ? citizen.email : "Unknown",
                    content: caption,
                    image: reader.result,
                    timestamp: new Date()
                };

                try {
                    const response = await fetch(`${API_URL}/api/create-post`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(postData)
                    });

                    if (response.ok) {
                        alert("Broadcast Successful!");
                        location.href = 'index.html'; // Go back to feed
                    }
                } catch (err) {
                    alert("Sync Error. Check your connection.");
                }
            };
        }
    </script>
</body>
</html>
