<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI-EMPIRE | VENDOR COMMAND</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --card: #111; --input: #1a1a1a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px 20px 100px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--gold); font-size: 18px; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .header p { font-size: 10px; color: #555; margin-top: 5px; font-weight: 800; }

        .form-section { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-label { color: var(--gold); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; border-left: 3px solid var(--gold); padding-left: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #777; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; background: var(--input); border: 1px solid #333; color: white; 
            padding: 15px; border-radius: 12px; font-size: 13px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--gold); background: #222; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-deploy { 
            background: var(--gold); color: #000; width: 100%; padding: 20px; border-radius: 15px; 
            border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; 
            font-size: 13px; letter-spacing: 2px; margin-top: 20px; box-shadow: 0 10px 30px rgba(212,175,55,0.2);
            transition: 0.3s;
        }
        .btn-deploy:active { transform: scale(0.98); }

        /* MASTER NAV */
        .master-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-box { text-align: center; color: #555; text-decoration: none; font-size: 20px; }
        .nav-box p { font-size: 9px; margin-top: 5px; font-weight: bold; text-transform: uppercase; }
        .nav-box.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Global Vendor Command</h1>
        <p>NAWI EMPIRE ASSET REGISTRATION PROTOCOL</p>
    </div>

    <form id="globalProductForm">
        <div class="form-section">
            <span class="section-label">Asset Identity</span>
            <div class="input-group">
                <label>Asset Name (Product Title)</label>
                <input type="text" id="product_name" placeholder="e.g. Empire Signature Hoodie" required>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>7 Pillars Category</label>
                    <select id="category" required>
                        <option value="Apparel">Apparel & Design</option>
                        <option value="Accessories">Luxury Accessories</option>
                        <option value="Kitchen_Meal">Kitchen Meal</option>
                        <option value="Gaming_Asset">Gaming Assets</option>
                        <option value="Logo">Professional Logo</option>
                        <option value="Music">Music Promotion</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Product SKU</label>
                    <input type="text" id="sku" placeholder="NW-GLOBAL-001">
                </div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-label">P2P Economics & Distribution</span>
            <div class="grid-2">
                <div class="input-group">
                    <label>Price (Local Amount)</label>
                    <input type="number" id="priceLocal" placeholder="0.00" required style="color: #00ff64; font-weight: bold;">
                </div>
                <div class="input-group">
                    <label>Currency Detected</label>
                    <select id="currencyCode" style="border: 1px solid var(--gold); color: var(--gold); font-weight: bold;">
                        <option value="NGN">🇳🇬 NGN (Naira)</option>
                        <option value="USD">🇺🇸 USD (Dollar)</option>
                        <option value="GBP">🇬🇧 GBP (Pound)</option>
                        <option value="INR">🇮🇳 INR (Rupee)</option>
                    </select>
                </div>
            </div>
            <p style="font-size: 9px; color: #00ff64; font-weight: 800; margin-top: 15px;"><i class="fa-solid fa-shield-halved"></i> P2P GATEWAY: ESCROW HELD BY EMPIRE</p>
        </div>

        <div class="form-section">
            <span class="section-label">Live Preview & Human Supply</span>
            <div class="input-group">
                <label>3D Model / Live Preview URL</label>
                <input type="url" id="threeD_url" placeholder="https://empire-assets.com/view/001">
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Supply Origin</label>
                    <input type="text" id="shippingOrigin" placeholder="e.g. Lagos, Nigeria">
                </div>
                <div class="input-group">
                    <label>Stock Status</label>
                    <select id="stockStatus">
                        <option value="In_Stock">In Stock</option>
                        <option value="Made_to_Order">Made to Order</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-label">Asset Description</span>
            <textarea id="description" placeholder="Describe the global utility of this asset..." rows="3" style="font-family: inherit;"></textarea>
        </div>

        <button type="submit" class="btn-deploy">Deploy to Global Vault</button>
    </form>

    <nav class="master-nav">
        <a href="index.html" class="nav-box"><i class="fa-solid fa-house"></i><p>Home</p></a>
        <a href="market.html" class="nav-box"><i class="fa-solid fa-shop"></i><p>Market</p></a>
        <a href="profile.html" class="nav-box"><i class="fa-solid fa-user-shield"></i><p>CEO</p></a>
    </nav>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";

        document.getElementById('globalProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // This object matches your MongoDB Schema exactly
            const productData = {
                productName: document.getElementById('product_name').value,
                category: document.getElementById('category').value,
                priceLocal: document.getElementById('priceLocal').value,
                currencyCode: document.getElementById('currencyCode').value,
                threeD_model_url: document.getElementById('threeD_url').value,
                shippingOrigin: document.getElementById('shippingOrigin').value,
                stockStatus: document.getElementById('stockStatus').value,
                description: document.getElementById('description').value,
                brandOwner: "NAWI-EMPIRE",
                escrowStatus: "Held_by_Empire"
            };

            try {
                const response = await fetch(`${API_URL}/api/add-product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (response.ok) {
                    alert("SUCCESS: Asset '" + productData.productName + "' deployed. P2P Gateway Active.");
                    window.location.href = "index.html"; 
                } else {
                    alert("Vault Error: Empire Database rejected the Asset.");
                }
            } catch (err) {
                console.error("Deploy Error:", err);
                alert("Critical Error: Ensure Render server is 'Live'.");
            }
        });
    </script>
</body>
</html>
