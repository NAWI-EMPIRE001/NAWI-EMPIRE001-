<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #000; --dark: #0a0a0a; }
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .login-card { 
            width: 85%; 
            max-width: 350px; 
            background: var(--dark); 
            padding: 40px 30px; 
            border-radius: 30px; 
            border: 1px solid #1a1a1a; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-icon { 
            font-size: 50px; 
            color: var(--gold); 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 18px; letter-spacing: 4px; color: var(--gold); margin: 0 0 10px; font-weight: 900; }
        p { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #444; }

        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid #222; 
            padding: 15px 15px 15px 45px; 
            border-radius: 12px; 
            color: white; 
            font-size: 14px; 
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); outline: none; background: #050505; }

        .btn-access { 
            width: 100%; 
            background: var(--gold); 
            color: black; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-access:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }

        .footer-note { margin-top: 25px; font-size: 9px; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>AUTHORITY</h1>
        <p>Master Dashboard Login</p>

        <form onsubmit="return handleLogin(event)">
            <div class="input-group">
                <i class="fa-solid fa-user-shield"></i>
                <input type="text" id="adminID" placeholder="CEO Identifier" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="accessCode" placeholder="Access Code" required>
            </div>

            <button type="submit" class="btn-access">Enter Control Center</button>
        </form>

        <div class="footer-note">PRIVATE PROPERTY OF NAWI-EMPIRE</div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('adminID').value;
            const code = document.getElementById('accessCode').value;

            // Simple logic for your private access
            // You can change "admin" and "7777" to whatever you like
            if (id === "NAWI-EMPIRE" && code === "7pillars") {
                alert('Access Granted. Welcome, CEO.');
                window.location.href = 'control-center.html';
            } else {
                alert('Access Denied. Authority mismatch.');
            }
        }
    </script>

</body>
</html>
