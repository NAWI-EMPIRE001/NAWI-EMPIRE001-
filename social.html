<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI | Social Feed</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .post { border-bottom: 1px solid #222; padding: 15px; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ffd700; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-img { width: 100%; border-radius: 10px; background: #1a1a1a; height: 250px; display: flex; align-items: center; justify-content: center; }
        .actions { display: flex; gap: 20px; margin-top: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div style="padding: 15px; border-bottom: 1px solid #ffd700; position: sticky; top: 0; background: #000;">
        <h2 style="margin: 0; color: #ffd700;">EMPIRE FEED</h2>
    </div>

    <div class="post">
        <div class="user-info"><div class="avatar">V</div><b>Vicky Para</b></div>
        <div class="post-img">🔥 LUXURY DESIGN LIVE</div>
        <div class="actions"><span>❤️</span><span>💬</span><span>🚀</span></div>
    </div>

    <div class="post">
        <div class="user-info"><div class="avatar">S</div><b>Success</b></div>
        <div class="post-img">✨ THE FUTURE IS NAWI</div>
        <div class="actions"><span>❤️</span><span>💬</span><span>🚀</span></div>
    </div>

    <button onclick="location.href='index.html'" style="width:100%; padding:20px; background:none; color:#888; border:none;">← BACK TO DASHBOARD</button>
</body>
</html>
