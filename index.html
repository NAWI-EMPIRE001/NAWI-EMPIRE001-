<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 PILLARS | NAWI-EMPIRE FULL NODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .gold { color: #f59e0b; text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div class="text-center mb-8">
        <h1 class="text-[8px] tracking-[6px] text-zinc-500 uppercase mb-2">Sovereign Reserve</h1>
        <h2 id="amt" class="text-5xl font-black gold italic">35,000,000</h2>
        <p class="text-[7px] text-amber-500 mt-2 tracking-[4px]">7 PILLARS OFFICIAL NODE</p>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <button onclick="alert('P2P Portal: Contact Director for Node Address')" class="panel p-4 flex flex-col items-center">
            <i data-lucide="arrow-down-to-line" class="text-emerald-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">Deposit</span>
        </button>
        <button onclick="alert('Withdrawal Request Sent to Queue')" class="panel p-4 flex flex-col items-center">
            <i data-lucide="arrow-up-from-line" class="text-zinc-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Withdraw</span>
        </button>
        <button onclick="alert('10/10 Slots Reserved')" class="panel p-4 flex flex-col items-center col-span-2">
            <i data-lucide="users" class="text-amber-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">Founders Registry (10)</span>
        </button>
        <div class="panel p-4 flex flex-col items-center">
            <i data-lucide="trending-up" class="text-blue-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">Growth: +12%</span>
        </div>
        <button onclick="alert('No recent transactions')" class="panel p-4 flex flex-col items-center">
            <i data-lucide="list" class="text-zinc-400 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">History</span>
        </button>
        <button onclick="alert('Opening Encrypted Channel...')" class="panel p-4 flex flex-col items-center">
            <i data-lucide="message-square" class="text-purple-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">Director Chat</span>
        </button>
        <button onclick="alert('Voting Closed')" class="panel p-4 flex flex-col items-center">
            <i data-lucide="gavel" class="text-red-500 mb-2"></i>
            <span class="text-[9px] font-bold uppercase">Governance</span>
        </button>
    </div>

    <div class="panel p-6 text-center border-amber-600/30">
        <p class="text-[8px] uppercase text-zinc-500 mb-1">Directorate Authority</p>
        <p class="text-lg font-black italic tracking-widest uppercase">7 PILLARS</p>
    </div>

    <script>
        lucide.createIcons();
        window.onload = function() {
            const s = localStorage.getItem('nawi_v2');
            if(s) document.getElementById('amt').innerText = Number(s).toLocaleString();
        };
    </script>
</body>
</html>
