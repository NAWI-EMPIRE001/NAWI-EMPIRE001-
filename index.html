<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI EMPIRE | Official Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="status-bar">
            <span id="socket-status">● SOCKET: ACTIVE</span>
        </div>
        <h1>NAWI EMPIRE</h1>
    </header>

    <main class="mall-container">
        <h2 class="gold-text">The Digital Mall</h2>
        
        <div class="service-grid">
            <div class="service-card">
                <h3>Elite Graphics</h3>
                <p>3D Logos & Branding</p>
                <button class="order-btn" onclick="order('Graphics')">Access Service</button>
            </div>

            <div class="service-card">
                <h3>Music Branding</h3>
                <div class="audio-box">Preview Active</div>
                <button class="order-btn" onclick="order('Music')">Listen & Commission</button>
            </div>
        </div>
    </main>

    <script>
        function order(service) {
            alert("Connecting to NAWI Secure Checkout for " + service + "...");
            // This is where we will link your WhatsApp or payment gate later
        }
    </script>
</body>
</html>
