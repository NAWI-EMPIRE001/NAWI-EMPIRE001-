<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE | Official Sovereign Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; --black: #080808; --card-bg: #121212; 
            --accent: #1a1a1a; --glass: rgba(255, 255, 255, 0.05); --green: #00ff88;
        }

        body { 
            margin: 0; background: var(--black); color: #fff; 
            font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* --- 🛡️ AUTHORITY GATE --- */
        #auth-gate { 
            height: 100vh; width: 100%; position: fixed; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #111 0%, #000 100%); z-index: 5000; transition: 0.8s ease; 
        }
        .authority-card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--gold); border-radius: 24px; 
            padding: 40px 30px; max-width: 350px; text-align: center; backdrop-filter: blur(15px);
        }
        .order-text { font-size: 13px; line-height: 1.6; color: #eee; border-left: 3px solid var(--gold); padding-left: 15px; text-align: left; font-style: italic; margin: 20px 0; }
        .gate-btn { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- 🏛️ MAIN PLATFORM --- */
        #main-platform { display: none; opacity: 0; transition: 1s ease; padding-bottom: 120px; }

        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 4px; font-size: 16px; color: var(--gold); }
        .node-active { font-size: 9px; background: rgba(0, 255, 136, 0.1); color: var(--green); padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(0, 255, 136, 0.2); }

        .dashboard { margin: 10px 20px; background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid var(--accent); position: relative; }
        .balance { font-size: 42px; font-weight: 900; margin: 15px 0; font-family: 'Syncopate', sans-serif; }
        .balance span { color: var(--gold); font-size: 18px; }

        /* --- 7 PILLARS GRID --- */
        .section-header { padding: 30px 20px 15px; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #444; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .module { background: var(--card-bg); border: 1px solid var(--accent); border-radius: 20px; height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; transition: 0.3s; }
        .module i { font-size: 26px; margin-bottom: 12px; color: var(--gold); }
        .module span { font-size: 9px; font-weight: 800; color: #eee; text-transform: uppercase; letter-spacing: 1px; }

        /* --- DOCK NAVIGATION --- */
        .nav-dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; z-index: 4000; }
        .nav-icon { color: #444; font-size: 20px; text-decoration: none; padding: 10px; }
        .nav-icon.active { color: var(--gold); }
        .core-node { width: 55px; height: 55px; background: var(--gold); border-radius: 50%; margin-top: -35px; display: flex; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 22px; border: 6px solid var(--black); }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="authority-card">
            <div style="color:var(--gold); font-weight:900; font-size:10px; letter-spacing:4px;">EMPIRE MANDATE</div>
            <p class="order-text">"This is my order and my authority to protect the founders and this platform... follow the rules of this platform."</p>
            <button class="gate-btn" onclick="unlockEmpire()">Unlock Ecosystem</button>
        </div>
    </div>

    <div id="main-platform">
        <header>
            <div class="logo">NAWI EMPIRE</div>
            <div id="status-node" class="node-active">Synchronizing...</div>
        </header>

        <div class="dashboard">
            <div style="font-size:10px; color:#666; text-transform:uppercase;">Central Reserve</div>
            <div class="balance" id="coin-balance">0.00 <span>$EMPR</span></div>
        </div>

        <div class="section-header">7 Pillars Studios</div>
        <div class="grid" id="pillar-grid">
            <a href="live-stream.html" class="module"><i class="fa-solid fa-tower-broadcast"></i><span>Live Stream</span></a>
            <a href="gaming.html" class="module"><i class="fa-solid fa-gamepad"></i><span>Gaming</span></a>
            <a href="kitchen.html" class="module"><i class="fa-solid fa-utensils"></i><span>Kitchen Meal</span></a>
            <a href="apparel.html" class="module"><i class="fa-solid fa-shirt"></i><span>Apparel</span></a>
            <a href="music.html" class="module"><i class="fa-solid fa-music"></i><span>Music Prod.</span></a>
            <a href="ads.html" class="module"><i class="fa-solid fa-rectangle-ad"></i><span>Ads Program</span></a>
        </div>

        <div class="nav-dock">
            <a href="index.html" class="nav-icon active"><i class="fa-solid fa-house-chimney"></i></a>
            <a href="market.html" class="nav-icon"><i class="fa-solid fa-shop"></i></a>
            <div class="core-node">7</div>
            <a href="messages.html" class="nav-icon"><i class="fa-solid fa-message-dots"></i></a>
            <div id="profile-trigger" class="nav-icon"><i class="fa-solid fa-circle-user"></i></div>
        </div>
    </div>

    <script>
        const API_URL = "https://nawi-empire1.onrender.com";
        const FOUNDER_EMAIL = "akpanvictor848@gmail.com";

        // 1. DATA ACTIVATOR (The connection to MongoDB)
        async function syncWithVault() {
            try {
                const response = await fetch(`${API_URL}/api/get-products`);
                if (response.ok) {
                    document.getElementById('status-node').innerText = "Node 001 Active";
                    console.log("Vault Synchronized.");
                }
            } catch (err) {
                document.getElementById('status-node').innerText = "Vault Offline";
            }
        }

        // 2. THE LONG-PRESS MASTER COMMAND
        let pressTimer;
        const profileBtn = document.getElementById('profile-trigger');

        profileBtn.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => {
                // Grant Master Access
                localStorage.setItem('NAWI_MASTER_TOKEN', 'SOVEREIGN_001_ALPHA_OMEGA');
                localStorage.setItem('NAWI_DEVICE_SIG', 'Tecno-Spark-30C-EMPIRE');
                window.location.href = 'sys-log-cache-82.html'; 
            }, 2000); // 2 second hold
        });

        profileBtn.addEventListener('touchend', () => clearTimeout(pressTimer));

        // 3. EMPIRE UNLOCK
        function unlockEmpire() {
            document.getElementById('auth-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('main-platform').style.display = 'block';
                document.getElementById('main-platform').style.opacity = '1';
                syncWithVault();
            }, 800);
        }
    </script>
</body>
</html>
