<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="ghost-trigger" style="position:fixed; top:0; right:0; width:50px; height:50px; z-index:3000;"></div>

    <div class="feed-wrapper" id="feed">
        <div class="content-card">
            <div class="content-overlay">
                <h4>@Founder_Active</h4>
                <p>Welcome to the New Empire. Content is King. 🚀</p>
            </div>
            <div class="side-actions">
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-comment"></i>
                <i class="fa-solid fa-share"></i>
                <i class="fa-solid fa-gift" style="color:gold" onclick="alert('Send Gift to Creator')"></i>
            </div>
            <img src="https://via.placeholder.com/1080x1920/050505/D4AF37?text=Post+1" style="width:100%; height:100%; object-fit:cover;">
        </div>
    </div>

    <div id="drawer" class="pillars-drawer">
        <h2 style="color:gold; margin-bottom:20px;">7 PILLARS</h2>
        <a href="ads.html" class="pillar-item"><i class="fa-solid fa-rectangle-ad"></i> Ads Manager</a>
        <a href="live.html" class="pillar-item"><i class="fa-solid fa-tower-broadcast"></i> Live Stream Studio</a>
        <a href="games.html" class="pillar-item"><i class="fa-solid fa-gamepad"></i> Gaming Studio</a>
        <a href="market.html" class="pillar-item"><i class="fa-solid fa-shop"></i> Marketplace</a>
        <a href="kitchen.html" class="pillar-item"><i class="fa-solid fa-utensils"></i> Kitchen</a>
        <a href="music.html" class="pillar-item"><i class="fa-solid fa-music"></i> Music Promotion</a>
        <a href="design.html" class="pillar-item"><i class="fa-solid fa-palette"></i> Creative Studio</a>
        <hr style="border:0.5px solid #333; margin:20px 0;">
        <a href="privacy.html" class="pillar-item"><i class="fa-solid fa-shield-halved"></i> Privacy Policy</a>
        <a href="settings.html" class="pillar-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-btn active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="social.html" class="nav-btn"><i class="fa-solid fa-compass"></i>Explore</a>
        <div class="plus-btn" onclick="alert('Post Content')"><i class="fa-solid fa-plus"></i></div>
        <a href="live.html" class="nav-btn"><i class="fa-solid fa-video"></i>Live</a>
        <div class="nav-btn" onclick="document.getElementById('drawer').classList.toggle('open')">
            <i class="fa-solid fa-bars"></i>Menu
        </div>
    </nav>

    <script>
        // Ghost CEO logic - Long press 3 seconds on top right
        let ghost = document.getElementById('ghost-trigger');
        let timer;
        ghost.onmousedown = function() { timer = setTimeout(() => { 
            let pin = prompt("EXCELLENCY IDENTIFIED. ENTER KEY:");
            if(pin === "1234") alert("Vault Unlocked: 35,000,000 pts");
        }, 3000); };
        ghost.onmouseup = function() { clearTimeout(timer); };
    </script>
</body>
</html>
