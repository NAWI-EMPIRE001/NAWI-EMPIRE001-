<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* VIDEO SCROLL CONTAINER */
        .video-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }
        .video-container::-webkit-scrollbar { display: none; }

        .video-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #111;
        }

        /* REAL VIDEO ELEMENT */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* SIDE INTERACTION BUTTONS */
        .side-icons {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }
        .icon-group { text-align: center; cursor: pointer; }
        .icon-group i { font-size: 30px; display: block; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .icon-group span { font-size: 12px; font-weight: bold; }

        /* USER INFO & CAPTION */
        .post-data {
            position: absolute;
            left: 15px;
            bottom: 100px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .post-data h3 { margin: 0 0 5px 0; color: var(--gold); }
        .post-data p { margin: 0; font-size: 14px; }

        /* BOTTOM NAV BAR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .nav-link { color: #888; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 2px; }

        /* THE PLUS BUTTON */
        .plus-btn {
            width: 45px;
            height: 30px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            position: relative;
        }
        .plus-btn::before { content: ''; position: absolute; left: -5px; width: 10px; height: 100%; background: #69C9D0; border-radius: 4px; z-index: -1; }
        .plus-btn::after { content: ''; position: absolute; right: -5px; width: 10px; height: 100%; background: #EE1D52; border-radius: 4px; z-index: -1; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-section">
            <video loop autoplay muted playsinline>
                <source src="https://v.ftcdn.net/05/22/01/71/700_F_522017124_pG2f7P0M20kGvWz6L2I3YI9z5S2hJt8L_ST.mp4" type="video/mp4">
            </video>

            <div class="side-icons">
                <div class="icon-group" onclick="this.style.color='red'"><i class="fa-solid fa-heart"></i><span>1.2M</span></div>
                <div class="icon-group"><i class="fa-solid fa-comment-dots"></i><span>45K</span></div>
                <div class="icon-group"><i class="fa-solid fa-share"></i><span>12K</span></div>
            </div>

            <div class="post-data">
                <h3>@Founder</h3>
                <p>Welcome to NAWI Empire. Follow the rules to stay. 💎</p>
            </div>
        </div>

        <div class="video-section">
            <video loop muted playsinline>
                <source src="https://v.ftcdn.net/02/76/86/06/700_F_276860662_vR454A6XpY6F8A9Z9V5G7L9O4X8A9L8C_ST.mp4" type="video/mp4">
            </video>
            <div class="post-data">
                <h3>@Creator_Brand</h3>
                <p>Grow your brand here. Follow for Follow! 🚀</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="discover.html" class="nav-link"><i class="fa-solid fa-compass"></i>Discover</a>
        <div class="plus-btn" onclick="alert('Opening Secret Master Menu...')"><i class="fa-solid fa-plus"></i></div>
        <a href="inbox.html" class="nav-link"><i class="fa-solid fa-comment-dots"></i>Inbox</a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i>Profile</a>
    </div>

    <script>
        // Automatic video play on scroll
        const container = document.querySelector('.video-container');
        const videos = document.querySelectorAll('video');

        container.addEventListener('scroll', () => {
            videos.forEach(video => {
                const rect = video.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    video.play();
                } else {
                    video.pause();
                }
            });
        });
    </script>
</body>
</html>
