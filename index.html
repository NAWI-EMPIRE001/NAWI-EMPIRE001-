<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI EMPIRE | Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --black: #050505; --neon: #00ff41; }
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-user-select: none; 
            user-select: none;
        }

        /* --- 🛡️ 1. AUTHORITY GATE --- */
        #auth-gate { 
            height: 100vh; width: 100%; position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #111 0%, #000 100%); z-index: 20000; transition: 0.8s ease; 
        }
        .authority-card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--gold); border-radius: 24px; 
            padding: 40px 30px; max-width: 350px; text-align: center; backdrop-filter: blur(15px);
        }
        .order-text { 
            font-size: 11px; line-height: 1.6; color: #eee; border-left: 3px solid var(--gold); 
            padding-left: 15px; text-align: left; font-style: italic; margin: 20px 0; 
        }

        /* --- 🖼️ 2. THE 3-WAY PORTAL --- */
        #live-portal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px); z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px;
        }

        /* --- 📱 3. IMPERIAL ALERTS --- */
        #imperial-alert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0,0,0,0.98); border: 1px solid var(--gold);
            border-radius: 15px; padding: 15px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        .feed-container { padding: 15px; padding-bottom: 150px; display: none; }
        .post-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; margin-bottom: 25px; overflow: hidden; transition: 0.3s; }

        /* --- NAVIGATION FIX --- */
        .node-7-trigger {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; background: white; color: black; border-radius: 50%;
            display: none; align-items: center; justify-content: center; font-size: 28px;
            font-weight: 900; border: 6px solid var(--black); z-index: 8000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); cursor: pointer;
        }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #050505;
            display: none; justify-content: space-around; align-items: center;
            border-top: 1px solid #111; z-index: 5000;
        }

        /* MASTER MODE COLORS */
        .master-mode #r-label { color: var(--neon) !important; text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body id="mainBody">

    <div id="auth-gate">
        <div class="authority-card">
            <div style="color:var(--gold); font-weight:900; font-size:9px; letter-spacing:4px;">EMPIRE MANDATE</div>
            <p class="order-text">"This is my order and my authority to protect the founders and this platform... follow the rules."</p>
            <button onclick="unlockEmpire()" class="w-full bg-[#D4AF37] text-black py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Unlock Ecosystem</button>
        </div>
    </div>

    <div id="imperial-alert">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 border border-[#D4AF37] rounded flex items-center justify-center font-black text-[#D4AF37]">7</div>
            <div>
                <h5 class="text-[#D4AF37] text-[10px] font-black uppercase">Imperial Update</h5>
                <p id="alert-text" class="text-white text-[10px]"></p>
            </div>
        </div>
    </div>

    <div id="live-portal-overlay">
        <h2 class="text-amber-500 font-black italic tracking-tighter mb-10">SELECT DESTINATION</h2>
        <div class="grid grid-cols-1 gap-6 w-full max-w-xs">
            <button onclick="location.href='studio.html'" class="relative bg-zinc-900 p-6 rounded-[30px] border border-zinc-800 text-left">
                <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">Pillar 4</p>
                <h3 class="text-sm font-black uppercase">Live Studio</h3>
                <span class="absolute top-4 right-4 w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
            </button>
            <button onclick="location.href='games.html'" class="bg-zinc-900 p-6 rounded-[30px] border border-zinc-800 text-left">
                <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">Pillar 5</p>
                <h3 class="text-sm font-black uppercase">Gaming Arena</h3>
            </button>
            <button onclick="location.href='kitchen.html'" class="bg-zinc-900 p-6 rounded-[30px] border border-zinc-800 text-left">
                <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">Pillar 3</p>
                <h3 class="text-sm font-black uppercase">Kitchen Live</h3>
            </button>
        </div>
        <button onclick="closePortal()" class="mt-12 text-zinc-600 text-[10px] font-black uppercase">Return to Feed</button>
    </div>

    <header id="app-header" style="display:none;" class="p-6 pt-12 flex justify-between items-center sticky top-0 bg-black/95 z-40">
        <div>
            <p id="r-label" class="text-[7px] font-black tracking-[0.4em] text-zinc-600 uppercase">Empire Feed</p>
            <h1 class="text-xl font-black italic">NAWI SOCIAL</h1>
        </div>
        <div class="flex gap-4">
            <i class="fa-solid fa-plus text-zinc-400 text-xl" onclick="location.href='create-post.html'"></i>
            <div class="w-8 h-8 rounded-lg bg-zinc-900 border border-zinc-800 flex items-center justify-center">
                <i class="fa-solid fa-bell text-amber-500 text-xs"></i>
            </div>
        </div>
    </header>

    <main class="feed-container" id="empire-feed">
        <div id="feed-loader" class="text-center py-10">
            <i class="fa-solid fa-7 fa-spin text-amber-500 text-2xl"></i>
            <p class="text-[8px] text-zinc-600 mt-2 uppercase tracking-widest">Accessing Ledger...</p>
        </div>
    </main>

    <div class="node-7-trigger animate-pulse" id="center-node" onclick="openPortal()">7</div>

    <nav class="bottom-bar" id="main-nav">
        <a href="index.html" class="text-amber-500 text-2xl"><i class="fa-solid fa-house"></i></a>
        <a href="market.html" class="text-zinc-600 text-2xl"><i class="fa-solid fa-bag-shopping"></i></a>
        <div style="width: 75px;"></div>
        <a href="inbox.html" class="text-zinc-600 text-2xl"><i class="fa-solid fa-message"></i></a>
        <a href="profile.html" class="text-zinc-600 text-2xl" id="p-trigger"><i class="fa-solid fa-circle-user"></i></a>
    </nav>

    <script>
        // FIXED: Using relative paths so the connection works regardless of host
        const API_URL = ""; 

        function unlockEmpire() {
            document.getElementById('auth-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('empire-feed').style.display = 'block';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('center-node').style.display = 'flex';
                loadHomeFeed();
            }, 800);
        }

        function openPortal() { document.getElementById('live-portal-overlay').style.display = 'flex'; }
        function closePortal() { document.getElementById('live-portal-overlay').style.display = 'none'; }

        function showEmpireAlert(text) {
            const box = document.getElementById('imperial-alert');
            document.getElementById('alert-text').innerText = text;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        // 🕵️ MASTER LOGIN (0001)
        const trigger = document.getElementById('p-trigger');
        let pressTimer;
        trigger.addEventListener('pointerdown', () => {
            pressTimer = setTimeout(() => {
                const pass = prompt("ENTER MASTER DECREE:");
                if(pass === "0001") {
                    document.getElementById('mainBody').classList.add('master-mode');
                    document.getElementById('r-label').innerText = "SYSTEM CONTROL ROOM";
                    showEmpireAlert("Master Authenticated.");
                }
            }, 3000);
        });
        trigger.addEventListener('pointerup', () => clearTimeout(pressTimer));

        // 📥 FIXED FEED FETCH
        async function loadHomeFeed() {
            try {
                // Connection Bridge Corrected: /api/get-feed
                const response = await fetch(`${API_URL}/api/get-feed`);
                const posts = await response.json();
                const feed = document.getElementById('empire-feed');
                if(document.getElementById('feed-loader')) document.getElementById('feed-loader').remove();

                posts.forEach(post => {
                    const postHTML = `
                        <div class="post-card border-b border-zinc-900 pb-6 mb-6">
                            <div class="p-5 flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-zinc-800 border border-amber-500/10"></div>
                                <div>
                                    <p class="text-[8px] font-black uppercase text-amber-500">${post.isMasterPost ? 'FOUNDER NODE' : 'CITIZEN'}</p>
                                    <h3 class="text-xs font-bold text-white">${post.authorName || 'Citizen'}</h3>
                                </div>
                            </div>
                            <div class="px-2">
                                <img src="${post.mediaUrl}" class="w-full object-cover aspect-square rounded-[25px] border border-zinc-900" onerror="this.src='https://via.placeholder.com/400?text=Asset+Loading...'">
                            </div>
                            <div class="p-5">
                                <p class="text-[11px] text-zinc-400 mb-4">${post.description}</p>
                                <div class="flex justify-between items-center">
                                    <button class="text-amber-500 font-black text-[9px] uppercase border border-amber-500/20 px-6 py-2 rounded-full bg-amber-500/5">Support 7</button>
                                    <span class="text-white font-bold text-xs">${post.priceInCoins || 0} 🪙</span>
                                </div>
                            </div>
                        </div>`;
                    feed.insertAdjacentHTML('beforeend', postHTML);
                });
            } catch (err) {
                document.getElementById('feed-loader').innerHTML = '<p class="text-[8px] text-zinc-600 uppercase">SYNCING WITH LEDGER...</p>';
            }
        }
    </script>
</body>
</html>
