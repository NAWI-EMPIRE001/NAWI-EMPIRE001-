<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI-EMPIRE | Social Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #111; --black: #000; }
        body { background: var(--black); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* STICKY HEADER */
        .header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #111; 
            position: sticky; 
            top: 0; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { margin: 0; color: var(--gold); font-size: 20px; letter-spacing: 2px; font-weight: 900; }
        .header i { color: var(--gold); font-size: 20px; }

        /* POST STYLING */
        .post { border-bottom: 8px solid #080808; padding: 15px 0; }
        
        .user-info { display: flex; align-items: center; gap: 12px; padding: 0 15px 12px; }
        .avatar { 
            width: 38px; height: 38px; 
            border-radius: 50%; 
            background: linear-gradient(45deg, #D4AF37, #fdfc97); 
            color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900;
            font-size: 14px;
            border: 1px solid var(--gold);
        }
        .username { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }

        .post-content { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: #0a0a0a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px;
            font-weight: 800;
            color: #333;
            border-top: 1px solid #111;
            border-bottom: 1px solid #111;
            position: relative;
        }
        /* Add this class if you use real images later */
        .post-content img { width: 100%; height: 100%; object-fit: cover; }

        .post-actions { display: flex; gap: 20px; padding: 15px; font-size: 22px; }
        .action-btn { cursor: pointer; transition: 0.2s; color: #fff; }
        .action-btn:hover { color: var(--gold); }
        .liked { color: #ff3040 !important; }

        .post-details { padding: 0 15px; }
        .likes-count { font-size: 13px; font-weight: 800; margin-bottom: 5px; display: block; }
        .caption { font-size: 13px; line-height: 1.4; color: #ccc; }
        .caption b { color: #fff; margin-right: 5px; }

        /* MASTER NAVIGATION */
        .master-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-box { text-align: center; cursor: pointer; color: #555; text-decoration: none; }
        .nav-box p { font-size: 10px; margin: 5px 0 0; font-weight: bold; }
        .active-tab { color: var(--gold) !important; }
        .plus-btn { background: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>EMPIRE FEED</h2>
        <i class="fa-solid fa-bell"></i>
    </div>

    <div class="post">
        <div class="user-info">
            <div class="avatar">V</div>
            <span class="username">vicky_para</span>
        </div>
        <div class="post-content">
            <span style="color: var(--gold); letter-spacing: 2px;">LUXURY DESIGN LIVE</span>
        </div>
        <div class="post-actions">
            <i class="fa-regular fa-heart action-btn" onclick="toggleLike(this)"></i>
            <i class="fa-regular fa-comment action-btn" onclick="location.href='inbox.html'"></i>
            <i class="fa-regular fa-paper-plane action-btn"></i>
        </div>
        <div class="post-details">
            <span class="likes-count">1,204 likes</span>
            <div class="caption"><b>vicky_para</b> Building the future of branding with NAWI. 🔥</div>
        </div>
    </div>

    <div class="post">
        <div class="user-info">
            <div class="avatar">S</div>
            <span class="username">success_empire</span>
        </div>
        <div class="post-content">
            <span style="color: #444;">THE FUTURE IS NAWI</span>
        </div>
        <div class="post-actions">
            <i class="fa-regular fa-heart action-btn" onclick="toggleLike(this)"></i>
            <i class="fa-regular fa-comment action-btn" onclick="location.href='inbox.html'"></i>
            <i class="fa-regular fa-paper-plane action-btn"></i>
        </div>
        <div class="post-details">
            <span class="likes-count">850 likes</span>
            <div class="caption"><b>success_empire</b> Luxury is a mindset. ✨ #Empire7Pillars</div>
        </div>
    

    <nav class="master-nav">
        <a href="index.html" class="nav-box"><i class="fa-solid fa-house" style="font-size: 20px;"></i><p>Home</p></a>
        <a href="discover.html" class="nav-box active-tab"><i class="fa-solid fa-compass" style="font-size: 20px;"></i><p>Discover</p></a>
        <div onclick="window.location.href='index.html'" class="nav-box">
            <div class="plus-btn"><i class="fa-solid fa-plus" style="font-size: 20px; color: black;"></i></div>
        
        <a href="inbox.html" class="nav-box"><i class="fa-solid fa-message" style="font-size: 20px;"></i><p>Inbox</p></a>
        <a href="profile.html" class="nav-box"><i class="fa-solid fa-user" style="font-size: 20px;"></i><p>Profile</p></a>
    </nav>

    <script>
        function toggleLike(btn) {
            btn.classList.toggle('fa-regular');
            btn.classList.toggle('fa-solid');
            btn.classList.toggle('liked');
        }
    </script>

</body>
</html>
