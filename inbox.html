<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAWI EMPIRE | INBOX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #000; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* HEADER */
        .header { padding: 25px 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 18px; letter-spacing: 2px; color: var(--gold); }

        /* INBOX LIST */
        .message-list { padding: 10px; }
        .message-item { background: var(--glass); border: 1px solid #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; transition: 0.3s; cursor: pointer; }
        .message-item:active { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        
        .sender-icon { width: 50px; height: 50px; border-radius: 50%; background: #111; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; }
        .message-info { flex: 1; }
        .message-info h4 { margin: 0; font-size: 14px; }
        .message-info p { margin: 5px 0 0; font-size: 12px; color: #666; }
        .time { font-size: 10px; color: #444; }

        /* BOTTOM NAVIGATION */
        .master-nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-box { text-align: center; cursor: pointer; color: #555; text-decoration: none; }
        .nav-box p { font-size: 10px; margin: 5px 0 0; font-weight: bold; }
        .active-tab { color: var(--gold) !important; }
        .plus-btn { background: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -10px; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <h2>INBOX</h2>
        <i class="fa-solid fa-pen-to-square" style="color: var(--gold);"></i>
    </div>

    <div class="message-list">
        <div class="message-item">
            <div class="sender-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="message-info">
                <h4>System Authority</h4>
                <p>Welcome to your Sovereign Inbox. Platform is active.</p>
            </div>
            <div class="time">Just now</div>
        </div>

        <div class="message-item">
            <div class="sender-icon"><i class="fa-solid fa-user-tie"></i></div>
            <div class="message-info">
                <h4>New Brand Request</h4>
                <p>A new creator is requesting platform verification...</p>
            </div>
            <div class="time">12:00 AM</div>
        </div>
    </div>

    <nav class="master-nav">
        <a href="index.html" class="nav-box">
            <i class="fa-solid fa-house" style="font-size: 20px;"></i>
            <p>Home</p>
        </a>
        <a href="discover.html" class="nav-box">
            <i class="fa-solid fa-compass" style="font-size: 20px;"></i>
            <p>Discover</p>
        </a>
        <div onclick="window.location.href='app-grid.html'" class="nav-box">
            <div class="plus-btn"><i class="fa-solid fa-plus" style="font-size: 20px; color: black;"></i></div>
        </div>
        <a href="inbox.html" class="nav-box active-tab">
            <i class="fa-solid fa-message" style="font-size: 20px;"></i>
            <p>Inbox</p>
        </a>
        <a href="profile.html" class="nav-box">
            <i class="fa-solid fa-user" style="font-size: 20px;"></i>
            <p>Profile</p>
        </a>
    </nav>

</body>
</html>
