<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: sans-serif; }
        #video-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 20px; left: 20px; background: red; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .controls { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 20px; }
        .btn-action { background: rgba(0,0,0,0.5); border: 2px solid white; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .gift-btn { border-color: gold; color: gold; }
        .chat-overlay { position: absolute; bottom: 100px; left: 20px; width: 70%; max-height: 200px; overflow-y: auto; color: white; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="video-container">
        <div class="live-tag"><i class="fa-solid fa-circle"></i> LIVE</div>
        
        <video id="localVideo" autoplay playsinline muted></video>

        <div class="chat-overlay" id="chat">
            <p><strong>System:</strong> Welcome to NAWI Live Stream!</p>
        </div>

        <div class="controls">
            <div class="btn-action" onclick="switchCamera()"><i class="fa-solid fa-camera-rotate"></i></div>
            <div class="btn-action gift-btn" onclick="sendGift()"><i class="fa-solid fa-gem"></i></div>
            <div class="btn-action" onclick="location.href='index.html'"><i class="fa-solid fa-xmark"></i></div>
        </div>
    </div>

    <script>
        // ACTIVATE THE CAMERA ON SPARK 30C
        async function startLive() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('localVideo').srcObject = stream;
            } catch (err) {
                alert("Please allow camera access to go live.");
            }
        }

        function sendGift() {
            // This connects to your MongoDB balance
            alert("Sending Diamond Gift... -500 pts from Vault");
            // Here we would add the fetch() to update MongoDB
        }

        window.onload = startLive;
    </script>
</body>
</html>
